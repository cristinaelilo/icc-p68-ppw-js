<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 8 - Registro UPS</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>Registro de Usuario</h1>
        <p>Complete todos los campos obligatorios (*)</p>
        
        <form id="form-registro" novalidate>

            <div class="campo-grupo">
                <label for="nombre">Nombre completo *</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez" required>
            </div>

            <div class="campo-grupo">
                <label for="email">Correo Electrónico *</label>
                <input type="email" id="email" name="email" placeholder="usuario@ejemplo.com" required>
            </div>

            <div class="campo-grupo">
                <label for="telefono">Teléfono *</label>
                <input type="tel" id="telefono" name="telefono" placeholder="(099) 123-4567" required>
            </div>

            <div class="campo-grupo">
                <label for="fechaNacimiento">Fecha de Nacimiento *</label>
                <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
            </div>

            <div class="campo-grupo">
                <label for="genero">Género *</label>
                <select id="genero" name="genero" required>
                    <option value="">Seleccione una opción...</option>
                    <option value="masculino">Masculino</option>
                    <option value="femenino">Femenino</option>
                    <option value="otro">Otro</option>
                </select>
            </div>

            <div class="campo-grupo">
                <label for="password">Contraseña *</label>
                <input type="password" id="password" name="password" required>
                <div id="password-strength" class="password-strength">Fuerza: -</div>
            </div>

            <div class="campo-grupo">
                <label for="confirmar_password">Confirmar Contraseña *</label>
                <input type="password" id="confirmar_password" name="confirmar_password" required>
            </div>

            <div class="campo-grupo checkbox-grupo">
                <input type="checkbox" id="terminos" name="terminos" required>
                <label for="terminos">Acepto los términos *</label>
            </div>

            <button type="submit" id="btn-enviar">Registrarse</button>
            <button type="button" id="btn-limpiar" class="btn-secondary">Limpiar formulario</button>

        </form>
    </div>

    <script src="js/validacion.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
